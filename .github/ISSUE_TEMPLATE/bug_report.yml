# locked: false
name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues to ensure this bug has not already been reported.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Describe in detail how to reproduce this bug.
      placeholder: |
        1. Open the application...
        2. Run the following command...
        3. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide relevant environment details.
      placeholder: |
        - OS: [e.g., macOS 15.3, Ubuntu 24.04]
        - Application version / commit: [e.g., v0.1.0 or commit hash]
      render: markdown
    validations:
      required: true

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or paste relevant log output.
      render: text
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Optional. Define what a successful fix looks like, if known.
      placeholder: |
        - [ ] ...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
    validations:
      required: false
